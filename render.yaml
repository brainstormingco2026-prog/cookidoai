services:
  - type: web
    name: cookidoai
    runtime: docker
    plan: starter
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cookidoai-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: cookidoai-db
    plan: free
    databaseName: cookidoai
